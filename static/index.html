<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Finano AI">
<title>Finano AI</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="/icon-192.png">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root{--brand:#6366f1;--dark:#0f172a;--card:#1e293b;--accent:#22d3ee}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
body{font-family:'Inter',sans-serif;background:var(--dark);color:#fff}
.glass{background:rgba(30,41,59,.7);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08)}
.pulse-dot{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fade-in{animation:fadeIn .3s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
.btn-brand{background:var(--brand)}.btn-brand:hover{opacity:.85}
</style>
<script>
tailwind.config={theme:{extend:{colors:{
  brand:'var(--brand,#6366f1)',dark:'var(--dark,#0f172a)',
  card:'var(--card,#1e293b)',accent:'var(--accent,#22d3ee)'
}}}}
</script>
</head>
<body class="min-h-screen">

<!-- Login -->
<div id="login" class="min-h-screen flex items-center justify-center px-6 hidden">
  <div class="glass rounded-2xl p-8 w-full max-w-sm">
    <div class="flex items-center gap-3 mb-6">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center text-lg font-bold" style="background:var(--brand)">F</div>
      <div><div class="font-semibold">Finano AI</div><div class="text-xs text-gray-400">Panel administracyjny</div></div>
    </div>
    <form onsubmit="doLogin(event)">
      <label class="text-sm text-gray-400">Hasło</label>
      <input type="password" id="login-pass" class="w-full mt-1 mb-4 px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white focus:outline-none focus:border-brand" autofocus>
      <label class="text-sm text-gray-400">Kod 2FA</label>
      <input type="text" id="login-totp" inputmode="numeric" maxlength="6" class="w-full mt-1 mb-4 px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white focus:outline-none focus:border-brand tracking-[0.5em] text-center text-xl" placeholder="000000">
      <div id="login-error" class="text-red-400 text-sm mb-3 hidden"></div>
      <button type="submit" class="w-full py-3 rounded-xl font-medium btn-brand transition">Zaloguj</button>
    </form>
  </div>
</div>

<!-- Landing — dynamic sections -->
<div id="landing" class="min-h-screen flex flex-col">
  <nav class="flex items-center justify-between px-6 py-4">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center text-sm font-bold" style="background:var(--brand)">F</div>
      <span class="font-semibold text-lg">Finano AI</span>
    </div>
    <button onclick="requireAuth()" class="text-sm px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 transition">Dashboard</button>
  </nav>
  <div id="sections" class="flex-1 flex flex-col items-center px-6 py-8 gap-8 max-w-4xl mx-auto w-full">
    <!-- Dynamic sections rendered here -->
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="min-h-screen hidden">
  <nav class="flex items-center justify-between px-4 py-3 glass sticky top-0 z-50">
    <button onclick="showLanding()" class="flex items-center gap-2">
      <div class="w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold" style="background:var(--brand)">F</div>
      <span class="font-semibold">Dashboard</span>
    </button>
    <div class="flex items-center gap-3">
      <span id="ws-status" class="w-2 h-2 rounded-full bg-gray-500"></span>
      <span class="text-xs text-gray-400" id="ws-label">Łączenie...</span>
      <button onclick="doLogout()" class="text-xs px-3 py-1 rounded-lg bg-white/5 hover:bg-white/10">Wyloguj</button>
    </div>
  </nav>
  <div class="p-4 space-y-4 pb-20 max-w-4xl mx-auto">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
      <div class="glass rounded-xl p-3"><div class="text-xs text-gray-400">Status</div><div id="d-status" class="text-lg font-bold text-green-400 mt-1">-</div></div>
      <div class="glass rounded-xl p-3"><div class="text-xs text-gray-400">Dziś</div><div id="d-today" class="text-lg font-bold mt-1" style="color:var(--accent)">-</div></div>
      <div class="glass rounded-xl p-3"><div class="text-xs text-gray-400">Błędy</div><div id="d-errors" class="text-lg font-bold text-red-400 mt-1">-</div></div>
      <div class="glass rounded-xl p-3"><div class="text-xs text-gray-400">Koszt ($)</div><div id="d-cost" class="text-lg font-bold text-yellow-400 mt-1">-</div></div>
    </div>
    <div class="glass rounded-xl p-4"><h3 class="text-sm font-semibold text-gray-300 mb-3">Serwisy</h3><div id="d-services" class="space-y-2 text-sm"></div></div>
    <div class="glass rounded-xl p-4">
      <div class="flex items-center justify-between mb-3"><h3 class="text-sm font-semibold text-gray-300">Aktywność</h3><button onclick="refreshActivity()" class="text-xs" style="color:var(--brand)">Odśwież</button></div>
      <div id="d-activity" class="space-y-2 max-h-96 overflow-y-auto text-sm"></div>
    </div>
    <div class="glass rounded-xl p-4">
      <h3 class="text-sm font-semibold text-gray-300 mb-3"><span class="w-2 h-2 bg-red-500 rounded-full inline-block pulse-dot mr-1"></span>Live</h3>
      <div id="d-live" class="space-y-2 max-h-64 overflow-y-auto text-sm"><div class="text-gray-500">Oczekiwanie na zdarzenia...</div></div>
    </div>
  </div>
</div>

<script>
const API=location.origin, content={};
let authToken=localStorage.getItem('finano_token'), ws=null, publicWS=null;

const SECTION_ORDER=['announcement','hero','stats','features','services_status','hero_buttons','widgets','footer_text'];
const SYSTEM_KEYS=new Set(['theme_brand','theme_accent','theme_dark','theme_card','meta_description','_section_order']);
const HERO_KEYS=new Set(['hero_title','hero_highlight','hero_description']);

function h(){return authToken?{Authorization:'Bearer '+authToken}:{}}
async function f(p,o){try{const r=await fetch(API+p,o||{});if(r.status===401){doLogout();return null}return r.json()}catch{return null}}

// ── Section renderers ──
function renderSection(key, val) {
  let p=val; try{p=JSON.parse(val)}catch{}
  if(SYSTEM_KEYS.has(key)) return '';
  if(HERO_KEYS.has(key)) return ''; // handled by hero renderer
  if(key==='hero_buttons') return renderButtons(p);
  if(key==='footer_text') return `<div class="text-center text-xs text-gray-600 w-full">${val}</div>`;
  if(key==='widgets') return ''; // widgets appended to body separately

  // Auto-detect type
  if(typeof p==='object'&&p!==null&&p.text&&p.type) return renderAlert(key,p);
  if(Array.isArray(p)&&p.length&&p[0].label&&p[0].value!==undefined) return renderStats(key,p);
  if(Array.isArray(p)&&p.length&&p[0].title&&p[0].description) return renderCards(key,p);
  if(Array.isArray(p)&&p.length&&p[0].name&&p[0].status) return renderBadges(key,p);
  if(Array.isArray(p)&&p.length&&p[0].label&&(p[0].url||p[0].action)) return renderButtons(p);
  if(typeof p==='string'&&p.length>0) return `<div class="glass rounded-xl p-4 w-full fade-in"><h3 class="text-sm font-semibold text-gray-400 mb-2">${key.replace(/_/g,' ')}</h3><p class="text-gray-200">${p}</p></div>`;
  if(typeof p==='object') return renderJson(key,p);
  return '';
}

function renderAlert(k,d){
  const colors={info:'border-blue-500 bg-blue-500/10 text-blue-200',success:'border-green-500 bg-green-500/10 text-green-200',warning:'border-yellow-500 bg-yellow-500/10 text-yellow-200',danger:'border-red-500 bg-red-500/10 text-red-200'};
  return `<div class="w-full rounded-xl p-4 border-l-4 ${colors[d.type]||colors.info} fade-in">${d.text}</div>`;
}

function renderStats(k,items){
  return `<div class="grid grid-cols-2 md:grid-cols-${Math.min(items.length,4)} gap-4 w-full">${items.map(i=>
    `<div class="glass rounded-xl p-4 text-center fade-in"><div class="text-2xl font-bold" style="color:var(--accent)">${i.value}</div><div class="text-xs text-gray-400 mt-1">${i.icon||''} ${i.label}</div></div>`
  ).join('')}</div>`;
}

function renderCards(k,items){
  return `<div class="grid grid-cols-1 md:grid-cols-${Math.min(items.length,3)} gap-4 w-full">${items.map(i=>
    `<div class="glass rounded-xl p-5 fade-in"><div class="text-2xl mb-2">${i.icon||'📋'}</div><h4 class="font-semibold mb-1">${i.title}</h4><p class="text-sm text-gray-400">${i.description}</p></div>`
  ).join('')}</div>`;
}

function renderBadges(k,items){
  const sc={active:'bg-green-500/20 text-green-300',ok:'bg-green-500/20 text-green-300',online:'bg-green-500/20 text-green-300',standby:'bg-yellow-500/20 text-yellow-300',offline:'bg-red-500/20 text-red-300',error:'bg-red-500/20 text-red-300'};
  return `<div class="flex flex-wrap gap-2 w-full">${items.map(i=>
    `<span class="px-3 py-1 rounded-full text-sm ${sc[i.status?.toLowerCase()]||'bg-gray-500/20 text-gray-300'} fade-in">${i.icon||''} ${i.name} <span class="opacity-60">${i.status}</span></span>`
  ).join('')}</div>`;
}

function renderButtons(items){
  if(!Array.isArray(items)) return '';
  return `<div class="flex gap-3 flex-wrap justify-center w-full">${items.map(b=>{
    const style=b.color?`background:${b.color}`:(b.style==='primary'?'background:var(--brand)':'background:rgba(255,255,255,.05)');
    if(b.action==='dashboard') return `<button onclick="requireAuth()" class="px-6 py-3 rounded-xl font-medium hover:opacity-80 transition" style="${style}">${b.label}</button>`;
    return `<a href="${b.url||'#'}" target="_blank" class="px-6 py-3 rounded-xl font-medium hover:opacity-80 transition" style="${style}">${b.label}</a>`;
  }).join('')}</div>`;
}

function renderJson(k,d){
  return `<div class="glass rounded-xl p-4 w-full fade-in"><h3 class="text-sm font-semibold text-gray-400 mb-2">${k.replace(/_/g,' ')}</h3><pre class="text-xs text-gray-300 overflow-x-auto">${JSON.stringify(d,null,2)}</pre></div>`;
}

function renderHero(c){
  return `<div class="text-center w-full fade-in">
    <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full text-sm mb-6" style="background:color-mix(in srgb,var(--brand) 15%,transparent);color:var(--brand)">
      <span class="w-2 h-2 bg-green-400 rounded-full pulse-dot"></span><span>Online</span></div>
    <h1 class="text-4xl md:text-6xl font-bold mb-4 leading-tight">${c.hero_title||'Finano AI'}<br><span style="color:var(--brand)">${c.hero_highlight||''}</span></h1>
    <p class="text-gray-400 text-lg md:text-xl max-w-xl mx-auto mb-8">${c.hero_description||''}</p>
  </div>`;
}

// ── Build page from content ──
function buildPage(c) {
  // Apply theme
  if(c.theme_brand) document.documentElement.style.setProperty('--brand',c.theme_brand);
  if(c.theme_accent) document.documentElement.style.setProperty('--accent',c.theme_accent);
  if(c.theme_dark) document.documentElement.style.setProperty('--dark',c.theme_dark);
  if(c.meta_description) document.querySelector('meta[name=description]').content=c.meta_description;

  // Widgets (append to body, not sections)
  document.querySelectorAll('elevenlabs-convai').forEach(e=>e.remove());
  if(c.widgets) try{const ws=JSON.parse(c.widgets);ws.filter(w=>w.type==='elevenlabs'&&w.enabled).forEach(w=>{
    const el=document.createElement('elevenlabs-convai');el.setAttribute('agent-id',w.agent_id);document.body.appendChild(el)})}catch{}

  // Get section order
  let order=[...SECTION_ORDER];
  if(c._section_order) try{order=JSON.parse(c._section_order)}catch{}
  const allKeys=Object.keys(c).filter(k=>!SYSTEM_KEYS.has(k)&&!HERO_KEYS.has(k));
  const extra=allKeys.filter(k=>!order.includes(k)&&k!=='widgets');
  const finalOrder=[...order,...extra];

  // Build HTML
  let html=renderHero(c);
  for(const key of finalOrder){
    if(!c[key]) continue;
    html+=renderSection(key,c[key]);
  }
  document.getElementById('sections').innerHTML=html;
}

// ── CMS update via WebSocket (targeted) ──
function applyCMSUpdate(d) {
  if(!d.key||d.value===undefined) return;
  content[d.key]=d.value;

  // Theme — just update CSS var
  if(d.key.startsWith('theme_')){
    const prop='--'+d.key.replace('theme_','');
    document.documentElement.style.setProperty(prop,d.value);
    return;
  }
  if(d.key==='meta_description'){document.querySelector('meta[name=description]').content=d.value;return}

  // Rebuild page (fast — just innerHTML swap, widgets preserved)
  buildPage(content);
}

// ── Init ──
async function loadCMS(){const c=await f('/api/site/content');if(!c)return;Object.assign(content,c);buildPage(content)}
async function loadStats(){const d=await f('/api/site/public-stats');if(!d)return;
  // If stats section doesn't exist yet — we'll get them from buildPage
  const el=document.getElementById('stat-msgs');if(el)el.textContent=d.messages_today||0}

loadCMS();

// ── Public WebSocket ──
function connectPublicWS(){
  const url=`${location.protocol==='https:'?'wss:':'ws:'}//${location.host}/ws/public`;
  publicWS=new WebSocket(url);
  publicWS.onmessage=e=>{try{const msg=JSON.parse(e.data);
    if(msg.type==='ping')return;
    if(msg.type==='cms_update'&&msg.data)applyCMSUpdate(msg.data);
    if(msg.type==='message'){/* live counter updates handled by buildPage */}
  }catch{}};
  publicWS.onclose=()=>setTimeout(connectPublicWS,5000);
}
connectPublicWS();

// ── Auth ──
function requireAuth(){if(authToken){showDashboard();return}
  document.getElementById('landing').classList.add('hidden');document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('login').classList.remove('hidden');document.getElementById('login-pass').focus()}
async function doLogin(e){e.preventDefault();
  const r=await f('/api/site/login',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({password:document.getElementById('login-pass').value,totp_code:document.getElementById('login-totp').value})});
  if(r?.token){authToken=r.token;localStorage.setItem('finano_token',authToken);
    document.getElementById('login').classList.add('hidden');showDashboard()}
  else{const el=document.getElementById('login-error');el.textContent=r?.error||'Błąd';el.classList.remove('hidden')}}
function doLogout(){authToken=null;localStorage.removeItem('finano_token');if(ws)ws.close();
  document.getElementById('dashboard').classList.add('hidden');document.getElementById('login').classList.add('hidden');document.getElementById('landing').classList.remove('hidden')}

// ── Dashboard ──
function showDashboard(){document.getElementById('landing').classList.add('hidden');document.getElementById('login').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');refreshDashboard();connectWS()}
function showLanding(){document.getElementById('dashboard').classList.add('hidden');document.getElementById('landing').classList.remove('hidden');if(ws)ws.close()}

async function refreshDashboard(){
  const d=await f('/api/site/dashboard-stats',{headers:h()});if(!d||d.error)return;
  document.getElementById('d-status').textContent=d.health?.rc_connected?'Online':'Offline';
  document.getElementById('d-status').className=`text-lg font-bold mt-1 ${d.health?.rc_connected?'text-green-400':'text-red-400'}`;
  document.getElementById('d-today').textContent=d.today?.messages||0;
  document.getElementById('d-errors').textContent=d.today?.errors||0;
  document.getElementById('d-cost').textContent=(d.today?.cost_usd||0).toFixed(4);
  const svc=await f('/api/site/dashboard-services',{headers:h()});
  if(svc?.services)document.getElementById('d-services').innerHTML=svc.services.map(s=>
    `<div class="flex items-center justify-between p-2 rounded-lg bg-white/5"><div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full ${s.enabled&&s.healthy?'bg-green-400':'bg-red-400'}"></span><span>${s.display_name||s.name}</span></div><span class="text-gray-400">${s.tools_count} tools</span></div>`).join('');
  refreshActivity()}
async function refreshActivity(){const d=await f('/api/site/dashboard-activity?limit=20',{headers:h()});if(!d?.activity)return;
  document.getElementById('d-activity').innerHTML=d.activity.map(a=>
    `<div class="p-2 rounded-lg bg-white/5 fade-in"><div class="flex items-center justify-between"><span class="font-medium" style="color:var(--brand)">@${a.user}</span><span class="text-xs text-gray-500">${a.ts?new Date(a.ts).toLocaleTimeString('pl'):''}</span></div><div class="text-gray-300 mt-1">${a.question||'-'}</div><div class="flex gap-3 mt-1 text-xs text-gray-500">${a.response_ms?a.response_ms+'ms ':''}${a.tokens?a.tokens+' tok ':''}${a.tools_selected?a.tools_selected+' tools':''}${a.error?'<span class="text-red-400">'+a.error.substring(0,40)+'</span>':''}</div></div>`
  ).join('')||'<div class="text-gray-500">Brak aktywności</div>'}
function handleLiveEvent(msg){const t=msg.type,d=msg.data||{};
  const todayEl=document.getElementById('d-today');if(todayEl&&t==='message')todayEl.textContent=parseInt(todayEl.textContent||0)+1;
  const errEl=document.getElementById('d-errors');if(errEl&&t==='error')errEl.textContent=parseInt(errEl.textContent||0)+1;
  const act=document.getElementById('d-activity');if(act){const el=document.createElement('div');el.className='p-2 rounded-lg bg-white/5 fade-in';
    el.innerHTML=`<div class="flex items-center justify-between"><span class="font-medium" style="color:var(--brand)">@${d.user||'?'}</span><span class="text-xs text-gray-500">${new Date().toLocaleTimeString('pl')}</span></div><div class="text-gray-300 mt-1">${d.question||d.error||'-'}</div>`;
    act.prepend(el);if(act.children.length>30)act.lastChild.remove()}}

function connectWS(){if(ws&&ws.readyState<=1)return;
  ws=new WebSocket(`${location.protocol==='https:'?'wss:':'ws:'}//${location.host}/ws/live?token=${authToken}`);
  ws.onopen=()=>{document.getElementById('ws-status').className='w-2 h-2 rounded-full bg-green-400';document.getElementById('ws-label').textContent='Live'};
  ws.onclose=()=>{document.getElementById('ws-status').className='w-2 h-2 rounded-full bg-gray-500';document.getElementById('ws-label').textContent='Ponowne łączenie...';setTimeout(connectWS,3000)};
  ws.onmessage=e=>{try{const msg=JSON.parse(e.data);if(msg.type==='ping')return;
    if(msg.type==='cms_update'&&msg.data){applyCMSUpdate(msg.data);return}
    if(['message','tool_call','error'].includes(msg.type))handleLiveEvent(msg);
    const feed=document.getElementById('d-live'),el=document.createElement('div');
    el.className='p-2 rounded-lg fade-in';el.style.background='color-mix(in srgb,var(--brand) 10%,transparent)';
    el.innerHTML=`<span class="text-xs text-gray-400">${new Date(msg.ts*1000).toLocaleTimeString('pl')}</span><span class="ml-2" style="color:var(--brand)">${msg.type}</span><div class="text-xs text-gray-300 mt-1">${JSON.stringify(msg.data).substring(0,120)}</div>`;
    feed.prepend(el);if(feed.children.length>50)feed.lastChild.remove()}catch{}}}

if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
<script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
</body>
</html>
